name: Build for .no domain

# on:
#   push:
#     branches: [main]

## Manual trigger only, uncomment above when deployment ready.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
        env:
          DEPLOY_TARGET: no
      - uses: actions/upload-artifact@v4
        with:
          name: dist-no
          path: dist/
